name: CI - Build Spring Boot Application

on:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore application-dev.yml
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APP_DEV_YML }}" > src/main/resources/application-dev.yml

      - name: Restore application-test.yml
        run: |
          mkdir -p src/test/resources
          echo "${{ secrets.APP_TEST_YML }}" > src/test/resources/application-test.yml

      - name: Restore serviceAccountKey.json
        run: |
          echo "${{ secrets.SERVICE_ACCOUNT_JSON }}" > src/main/resources/serviceAccountKey.json

      - name: Run Tests
        run: |
          ./gradlew test

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/

      - name: Build Project
        run: |
          ./gradlew build -x test

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-app
          path: build/libs/*.jar