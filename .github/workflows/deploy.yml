name: Deploy Spring Boot to Server

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
    types:
      - closed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore application-dev.yml
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APP_DEV_YML }}" > src/main/resources/application-dev.yml

      - name: Restore serviceAccountKey.json
        run: |
          echo "${{ secrets.SERVICE_ACCOUNT_JSON }}" > src/main/resources/serviceAccountKey.json

      - name: Build Project
        run: |
          ./gradlew build -x test

      - name: Copy Files to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/1liceworks-be/build/libs/"

      - name: Deploy on Server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/
            ./deploy.sh